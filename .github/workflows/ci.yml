name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      # dev group only — the train group (torch cu128, unsloth, vllm) is
      # local-GPU-only and must never be installed on runners.
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q
